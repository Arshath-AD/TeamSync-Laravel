services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: teamsync-app
    ports:
      - "8080:8000"
    volumes:
      - .:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=apw_management
      - DB_USERNAME=teamsync
      - DB_PASSWORD=teamsync
    depends_on:
      - db

  db:
    image: mariadb:11
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=apw_management
      - MYSQL_USER=teamsync
      - MYSQL_PASSWORD=teamsync
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
